name: Deploy Ashvault to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Run production smoke test
        id: smoke
        continue-on-error: true
        run: node --require ./tests/diagnostic-hook.js tests/smoke-test.js

      - name: Upload smoke-test failure
        if: steps.smoke.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: smoke-error
          path: smoke-error.txt
          if-no-files-found: error
          retention-days: 3

      - name: Block release on smoke-test failure
        if: steps.smoke.outcome == 'failure'
        run: exit 1

      - name: Test branching routes
        run: node tests/route-system-test.js

      - name: Test authored art package
        run: node tests/authored-art-test.js

      - name: Validate JavaScript syntax
        run: |
          node --check game-core.js
          node --check game-combat.js
          node --check route-system.js
          node --check pixel-assets.js
          node --check game-render-v4.js
          node --check gba-visuals.js
          node --check gba-sprite-fix.js
          node --check production-mobile.js
          node --check release-enhancements.js
          node --check viewport-hotfix.js
          for file in authored-*.js; do node --check "$file"; done
          node --check service-worker.js
          node --check tests/smoke-test.js
          node --check tests/route-system-test.js
          node --check tests/authored-art-test.js
          node --check tests/diagnostic-hook.js

      - name: Validate release references
        run: |
          grep -q 'viewport-fit=cover' index.html
          grep -q 'manifest.webmanifest?v=12' index.html
          grep -q 'route-system.js?v=12' index.html
          grep -q 'gba-visuals.js?v=12' index.html
          grep -q 'gba-sprite-fix.js?v=12' index.html
          grep -q 'production-mobile.js?v=12' index.html
          grep -q 'release-enhancements.js?v=12' index.html
          grep -q 'viewport-hotfix.js?v=12' index.html
          grep -q 'authored-assets.js?v=12' index.html
          grep -q 'AUTHORED ART EDITION · BUILD 12' index.html
          test -f manifest.webmanifest
          test -f route-system.js
          test -f gba-visuals.js
          test -f gba-sprite-fix.js
          test -f production-mobile.js
          test -f release-enhancements.js
          test -f viewport-hotfix.js
          test -f service-worker.js
          test -f tests/authored-art-test.js
          for file in authored-*.js; do test -f "$file"; done

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp index.html styles.css manifest.webmanifest service-worker.js game-core.js game-combat.js route-system.js pixel-assets.js game-render-v4.js gba-visuals.js gba-sprite-fix.js production-mobile.js release-enhancements.js viewport-hotfix.js _site/
          cp authored-*.js _site/
          printf '{"commit":"%s","run":%s,"built_at":"%s"}\n' "$GITHUB_SHA" "$GITHUB_RUN_NUMBER" "$(date -u +%FT%TZ)" > _site/build-info.json
          touch _site/.nojekyll

      - name: Package itch.io HTML5 release
        run: |
          mkdir -p _release
          cd _site
          zip -9 -r ../_release/ashvault-html5.zip .

      - name: Upload itch.io package
        uses: actions/upload-artifact@v4
        with:
          name: ashvault-html5-${{ github.run_number }}
          path: _release/ashvault-html5.zip
          if-no-files-found: error
          retention-days: 30

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify live Build 12 deployment
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          ROOT="${PAGE_URL%/}/"
          for attempt in {1..12}; do
            if curl -fsSL -H 'Cache-Control: no-cache' "${ROOT}?verify=${EXPECTED_SHA}" -o /tmp/ashvault-index.html \
              && grep -q 'AUTHORED ART EDITION · BUILD 12' /tmp/ashvault-index.html \
              && grep -q 'authored-assets.js?v=12' /tmp/ashvault-index.html \
              && curl -fsSL -H 'Cache-Control: no-cache' "${ROOT}build-info.json?verify=${EXPECTED_SHA}" -o /tmp/build-info.json \
              && grep -q "${EXPECTED_SHA}" /tmp/build-info.json \
              && curl -fsSL -H 'Cache-Control: no-cache' "${ROOT}authored-assets.js?v=12&verify=${EXPECTED_SHA}" >/dev/null \
              && curl -fsSL -H 'Cache-Control: no-cache' "${ROOT}authored-player-0.js?v=12&verify=${EXPECTED_SHA}" >/dev/null \
              && curl -fsSL -H 'Cache-Control: no-cache' "${ROOT}authored-world-0.js?v=12&verify=${EXPECTED_SHA}" >/dev/null \
              && curl -fsSL -H 'Cache-Control: no-cache' "${ROOT}service-worker.js?verify=${EXPECTED_SHA}" >/dev/null; then
              echo "Verified live deployment at ${ROOT}"
              cat /tmp/build-info.json
              exit 0
            fi
            echo "Live site not updated yet; retrying in 10 seconds (${attempt}/12)."
            sleep 10
          done
          echo 'GitHub Pages did not serve the expected Build 12 commit within two minutes.' >&2
          exit 1
